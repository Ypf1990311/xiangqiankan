version: '3.7'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: alphahft_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - hft_network

  grafana:
    image: grafana/grafana:latest
    container_name: alphahft_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - hft_network

networks:
  hft_network:
    driver: bridge

volumes:
  grafana-data:
